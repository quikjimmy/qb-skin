                    </div>
                `;
            }

            html += `
                ${nextUpHtml}

                <!-- Milestone Timeline -->
                <div class="qb-card qb-milestone-section">
                    <h3>Progress Timeline</h3>
                    ${milestonesHtml}
                </div>

                <!-- Field Activity (Arrivy Tasks) -->
                <div class="qb-card qb-timeline-section">
                    <h3>Field Activity</h3>
                    <div id="arrivyTimeline">
                        <div class="qb-notes-placeholder">Loading field activity...</div>
                    </div>
                </div>

                <!-- Communications Section (Calls + Texts) -->
                <div class="qb-card qb-comms-section">
                    <h3>Communications</h3>
                    <div class="qb-comms-tabs" id="commsTabs">
                        <div class="qb-comms-tab active" data-tab="all">All</div>
                        <div class="qb-comms-tab" data-tab="calls">Calls</div>
                        <div class="qb-comms-tab" data-tab="texts">Texts</div>
                    </div>
                    <div id="commsContainer">
                        <div class="qb-notes-placeholder">Loading communications...</div>
                    </div>
                </div>

                <!-- Tickets Section -->
                <div class="qb-card qb-tickets-section">
                    <h3>Tickets <span class="qb-notes-count" id="ticketsCount">...</span></h3>
                    <div id="ticketsContainer">
                        <div class="qb-notes-placeholder">Loading tickets...</div>
                    </div>
                </div>

                <!-- Notes Section (collapsible) -->
                <div class="qb-card">
                    <div class="qb-notes-header" id="notesToggle">
                        <div class="qb-notes-title">
                            Notes <span class="qb-notes-count" id="notesCount">...</span>
                            <span class="qb-notes-toggle collapsed" id="notesArrow">&#9660;</span>
                        </div>
                    </div>
                    <div class="qb-notes-body collapsed" id="notesBody">
                        <button class="qb-add-note-button" id="addNoteBtn">+ Add Note</button>
                        <div class="qb-note-form" id="noteForm">
                            <div class="qb-note-form-inner">
                                <textarea id="noteText" placeholder="Write your note here..."></textarea>
                                <div class="qb-note-form-row">
                                    <select id="noteCategory">
                                        <option value="">Category...</option>
                                        <option value="General">General</option>
                                        <option value="Site Survey">Site Survey</option>
                                        <option value="Install">Install</option>
                                        <option value="Inspection">Inspection</option>
                                        <option value="Permitting">Permitting</option>
                                        <option value="Design">Design</option>
                                        <option value="Finance">Finance</option>
                                        <option value="Customer Service">Customer Service</option>
                                    </select>
                                    <select id="noteType">
                                        <option value="">Type...</option>
                                        <option value="Internal">Internal</option>
                                        <option value="Customer Call">Customer Call</option>
                                        <option value="Customer Text">Customer Text</option>
                                        <option value="Email">Email</option>
                                        <option value="Follow-Up">Follow-Up</option>
                                    </select>
                                </div>
                                <div class="qb-note-form-actions">
                                    <button class="qb-note-cancel-btn" id="noteCancelBtn">Cancel</button>
                                    <button class="qb-note-save-btn" id="noteSaveBtn">Save Note</button>
                                </div>
                            </div>
                        </div>
                        <div id="notesContainer">
                            <div class="qb-notes-placeholder">Loading notes...</div>
                        </div>
                    </div>
                </div>

                <!-- Quick Actions -->
                <div class="qb-card">
                    <div class="qb-actions-row">
                        <button class="qb-action-button" id="createTicketBtn">Create Ticket</button>
                        <button class="qb-action-button secondary" id="updateStatusBtn">Update Status</button>
                    </div>
                </div>

                <div style="height: 20px;"></div>
            `;

            main.innerHTML = html;

            // Attach event listeners
            attachEventListeners(projectName, status);
            loadExistingNotes();
            loadArrivyTimeline();
            loadCommunications();
            loadTickets();
        }

        // ========================================
        // Attach Event Listeners
        // ========================================
        function attachEventListeners(customerName, currentStatus) {
            // Notes section toggle (collapse/expand)
            document.getElementById('notesToggle').addEventListener('click', () => {
                const body = document.getElementById('notesBody');
                const arrow = document.getElementById('notesArrow');
                body.classList.toggle('collapsed');
                arrow.classList.toggle('collapsed');
            });

            // Add Note — toggle inline form
            document.getElementById('addNoteBtn').addEventListener('click', toggleNoteForm);
            document.getElementById('noteCancelBtn').addEventListener('click', closeNoteForm);
            document.getElementById('noteSaveBtn').addEventListener('click', submitNote);

            // Create Ticket
            document.getElementById('createTicketBtn').addEventListener('click', () => {
                window.location.href = `https://kin.quickbase.com/db/br9kwm8bk?a=dbpage&pagename=qb-skin-tasks.html#project=${recordId}`;
            });

            // Update Status
            document.getElementById('updateStatusBtn').addEventListener('click', openStatusDropdown);

            // Back, Refresh, Snapshot listeners are attached in DOMContentLoaded (always-active)
        }

        // ========================================
        // Load Existing Notes
        // ========================================
        async function loadExistingNotes() {
            try {
                // Notes table (bsb6bqt3b) field IDs:
                // 3 = Record ID#, 6 = Note, 7 = Category, 8 = Date, 9 = Note by
                // 13 = Related Project, 14 = Project - Full Name, 38 = Type, 39 = Disposition
                const noteFields = [3, 6, 7, 8, 9, 13, 38, 39];
                const whereClause = `{'13'.EX.'${recordId}'}`;
                const result = await apiQuery(QB_CONFIG.tables.notes, noteFields, whereClause, 50);

                const container = document.getElementById('notesContainer');
                const countEl = document.getElementById('notesCount');

                if (!result.data || result.data.length === 0) {
                    container.innerHTML = '<div class="qb-notes-placeholder">No notes yet</div>';
                    countEl.textContent = '0';
                    return;
                }

                countEl.textContent = result.data.length;

                // Sort by date descending (newest first)
                const sorted = result.data.sort((a, b) => {
                    const da = qbv(a, 8) || '';
                    const db = qbv(b, 8) || '';
                    return db.localeCompare(da);
                });

                let html = '';
                sorted.forEach(note => {
                    const noteText = qbv(note, 6) || '';
                    const noteDate = qbv(note, 8) ? formatDate(qbv(note, 8)) : 'No date';
                    // Field 9 is a user field — qbv now extracts email from object
                    const noteByRaw = note[9] && note[9].value ? note[9].value : null;
                    let authorDisplay = 'Unknown';
                    if (noteByRaw && typeof noteByRaw === 'object') {
                        authorDisplay = noteByRaw.name || (noteByRaw.email ? noteByRaw.email.split('@')[0] : 'Unknown');
                    } else if (noteByRaw) {
                        authorDisplay = String(noteByRaw).split('@')[0];
                    }
                    const category = qbv(note, 7) || '';

                    html += `
                        <div class="qb-note-entry">
                            <div class="qb-note-entry-meta">
                                <span class="qb-note-entry-author">${escapeHtml(authorDisplay)}</span>
                                <span class="qb-note-entry-time">${escapeHtml(noteDate)}</span>
                            </div>
                            <div>${escapeHtml(noteText)}</div>
                            ${category ? `<span class="qb-note-entry-category">${escapeHtml(category)}</span>` : ''}
                        </div>
                    `;
                });

                container.innerHTML = html;
            } catch (e) {
                console.error('[QBSkin] Error loading notes:', e, e.stack);
                const nc = document.getElementById('notesContainer');
                if (nc) nc.innerHTML = `<div class="qb-notes-placeholder">Could not load notes<br><small style="color:#999;">${escapeHtml(e.message)}</small></div>`;
                const nct = document.getElementById('notesCount');
                if (nct) nct.textContent = '?';
            }
        }

        async function loadArrivyTimeline() {
            try {
                // 3=RID, 6=RelProject, 56=Template, 85=Status, 115=Scheduled, 97=Submitted, 146=EnRoute, 117=Arrived, 268=CrewName, 197=AssignedCrew, 145=EnRouteName, 107=TaskURL, 270=InstallComplete, 198=kW
                // RTR fields: 242=Official:RTR Status, 243=Official:RTR Install Status, 248=Official:RTR Status Updated At, 258=Official:RTR Crew On Site, 217=# of Ready for RTR Task Logs
                const arrivyFields = [3, 6, 56, 85, 115, 97, 146, 117, 268, 197, 145, 107, 270, 198, 242, 243, 248, 258, 217];
                const whereClause = `{'6'.EX.'${recordId}'}`;
                const result = await apiQuery(QB_CONFIG.tables.arrivyTasks, arrivyFields, whereClause, 100);
                const container = document.getElementById('arrivyTimeline');
                if (!container) return;
                if (!result.data || result.data.length === 0) {
                    container.innerHTML = '<div class="qb-notes-placeholder">No field activity found</div>';
                    return;
                }
                console.log('[QBSkin] Arrivy tasks loaded:', result.data.length, 'First record sample:', JSON.stringify(result.data[0]).substring(0, 300));
                // Sort chronologically descending (newest first)
                const sorted = result.data.sort((a, b) => {
                    const da = String(qbv(a, 115) || '');
                    const db = String(qbv(b, 115) || '');
                    return db.localeCompare(da);
                });
                const now = new Date();
                const todayStr = now.toISOString().split('T')[0];
                let html = '';
                sorted.forEach(task => {
                    const tmpl = String(qbv(task, 56) || 'Unknown');
                    const schedDate = qbv(task, 115) ? String(qbv(task, 115)) : null;
                    const submittedDt = qbv(task, 97) ? String(qbv(task, 97)) : null;
                    const crew = String(qbv(task, 268) || qbv(task, 197) || qbv(task, 145) || 'TBA');
                    const status = String(qbv(task, 85) || 'Scheduled').trim();
                    const statusLow = status.toLowerCase();
                    const taskUrl = qbv(task, 107) ? String(qbv(task, 107)) : null;
                    const isService = tmpl.toLowerCase().includes('service');
                    const isOverdue = statusLow === 'overdue';
                    const isComplete = statusLow === 'complete' || statusLow === 'site work complete';
                    // schedDate may be ISO timestamp "2026-03-11T14:00:00Z" or plain date "2026-03-11"
                    const dateObj = schedDate ? new Date(schedDate.includes('T') ? schedDate : schedDate + 'T12:00:00') : null;
                    const dateStr = (dateObj && !isNaN(dateObj)) ? dateObj.toLocaleDateString('en-US', {month:'short', day:'numeric', year:'numeric'}) : 'No date';
                    const dateIso = (dateObj && !isNaN(dateObj)) ? dateObj.toISOString().split('T')[0] : '';
                    const isPast = dateIso && dateIso < todayStr;
                    const isToday = dateIso === todayStr;

                    let dotClass = 'active';
                    if (isComplete || submittedDt) dotClass = 'completed';
                    else if (isOverdue) dotClass = 'overdue';
                    else if (isPast) dotClass = '';
                    if (isService) dotClass = 'service';

                    // Status pill
                    let statusCls = 'scheduled';
                    if (isComplete) statusCls = 'complete';
                    else if (isOverdue) statusCls = 'overdue';
                    else if (submittedDt) statusCls = 'submitted';
                    else if (qbv(task, 146)) statusCls = 'enroute';

                    const link = taskUrl ? ` <a href="${taskUrl}" target="_blank" style="color:var(--status-info);font-size:11px;text-decoration:none;">View &rarr;</a>` : '';

                    // RTR (Real Time Review) — inline badge on the meta line
                    const rtrStatus = String(qbv(task, 242) || '').trim();
                    const rtrInstallStatus = String(qbv(task, 243) || '').trim();
                    const rtrUpdatedAt = qbv(task, 248) ? String(qbv(task, 248)) : '';
                    const rtrCrewOnSite = String(qbv(task, 258) || '').trim();
                    const rtrReadyCount = parseInt(qbv(task, 217) || 0);
                    let rtrPill = '';
                    if (rtrStatus) {
                        const rtrLow = rtrStatus.toLowerCase();
                        const rtrDateFmt = rtrUpdatedAt ? formatDate(rtrUpdatedAt) : '';
                        const rtrDetail = [rtrStatus, rtrDateFmt, rtrInstallStatus, (rtrCrewOnSite && rtrCrewOnSite.toLowerCase() !== 'no' ? 'Crew on site' : '')].filter(Boolean).join(' · ');
                        const rtrEmoji = rtrLow === 'pass' ? '✅' : rtrLow === 'fail' ? '❌' : '⚠️';
                        rtrPill = ` <span style="display:inline-block;padding:1px 6px;border-radius:10px;font-size:10px;font-weight:600;background:#f1f5f9;color:#334155;margin-left:4px;vertical-align:middle;cursor:help" title="${escapeHtml(rtrDetail)}">${rtrEmoji} RTR</span>`;
                    } else if (rtrReadyCount > 0) {
                        rtrPill = ` <span style="display:inline-block;padding:1px 6px;border-radius:10px;font-size:10px;font-weight:600;background:#f1f5f9;color:#334155;margin-left:4px;vertical-align:middle">⚠️ RTR</span>`;
                    }

                    html += `<div class="qb-timeline-item ${isPast&&!isToday?'past':''} ${isToday?'today':''}">
                        <div class="qb-timeline-dot ${dotClass}"></div>
                        <div class="qb-timeline-info">
                            <div class="qb-timeline-name">${isService?'<span style="display:inline-block;width:16px;height:16px;border-radius:3px;background:#8b5cf6;color:white;font-size:9px;font-weight:700;text-align:center;line-height:16px;margin-right:4px;">S</span>':''}${escapeHtml(tmpl)} <span class="qb-timeline-status ${statusCls}">${escapeHtml(status)}</span>${rtrPill}</div>
                            <div class="qb-timeline-meta">${dateStr} &middot; ${escapeHtml(crew)}${link}</div>
                        </div>
                    </div>`;
                });
                container.innerHTML = html;
            } catch (e) {
                console.error('[QBSkin] Error loading Arrivy timeline:', e, e.stack);
                const c = document.getElementById('arrivyTimeline');
                if (c) c.innerHTML = `<div class="qb-notes-placeholder">Could not load field activity<br><small style="color:#999;">${escapeHtml(e.message)}</small></div>`;
            }
        }

        // ========================================
        // Load Tickets
        // ========================================
        async function loadTickets() {
            const container = document.getElementById('ticketsContainer');
            const countEl = document.getElementById('ticketsCount');
            if (!container) return;

            try {
                // Tickets table (bstdqwrkg) — FID 26=Related Project
                // Select: 3=RID, 19=Title, 20=Description, 23=Date Created, 50=Ticket Issue, 52=Due Date,
                //         67=Assigned To, 87=Priority, 91=Status, 100=Assigned To(user), 108=Disposition, 109=View Ticket
                const ticketFields = [3, 19, 20, 23, 26, 50, 52, 67, 87, 91, 100, 108, 109];
                const whereClause = `{'26'.EX.'${recordId}'}`;
                const result = await apiQuery(QB_CONFIG.tables.tickets, ticketFields, whereClause, 50);

                if (!result.data || result.data.length === 0) {
                    container.innerHTML = '<div class="qb-notes-placeholder">No tickets for this project</div>';
                    if (countEl) countEl.textContent = '0';
                    return;
                }

                if (countEl) countEl.textContent = result.data.length;

                // Sort: open tickets first, then by date descending
                const sorted = result.data.sort((a, b) => {
                    const sa = String(qbv(a, 91) || '').toLowerCase();
                    const sb = String(qbv(b, 91) || '').toLowerCase();
                    const closedA = sa.includes('closed') || sa.includes('complete') || sa.includes('resolved') ? 1 : 0;
                    const closedB = sb.includes('closed') || sb.includes('complete') || sb.includes('resolved') ? 1 : 0;
                    if (closedA !== closedB) return closedA - closedB;
                    const da = String(qbv(a, 23) || '');
                    const db = String(qbv(b, 23) || '');
                    return db.localeCompare(da);
                });

                let html = '';
                sorted.forEach(ticket => {
                    const title = String(qbv(ticket, 19) || qbv(ticket, 50) || 'Untitled Ticket');
                    const status = String(qbv(ticket, 91) || 'Open');
                    const statusLow = status.toLowerCase();
                    const priority = String(qbv(ticket, 87) || '').toLowerCase();
                    const assignee = String(qbv(ticket, 67) || qbv(ticket, 100) || '');
                    const dueDate = qbv(ticket, 52) ? formatDate(qbv(ticket, 52)) : '';
                    const created = qbv(ticket, 23) ? formatDate(qbv(ticket, 23)) : '';
                    const issue = String(qbv(ticket, 50) || '');
                    const viewUrl = qbv(ticket, 109) ? String(qbv(ticket, 109)) : null;
                    const disposition = String(qbv(ticket, 108) || '');

                    // Priority bar color
                    let priClass = 'none';
                    if (priority.includes('high') || priority.includes('urgent') || priority.includes('critical')) priClass = 'high';
                    else if (priority.includes('medium') || priority.includes('normal')) priClass = 'medium';
                    else if (priority.includes('low')) priClass = 'low';

                    // Status badge class
                    let statusClass = 'open';
                    if (statusLow.includes('progress') || statusLow.includes('working')) statusClass = 'in-progress';
                    else if (statusLow.includes('closed') || statusLow.includes('complete') || statusLow.includes('resolved')) statusClass = 'closed';
                    else if (statusLow.includes('block') || statusLow.includes('hold')) statusClass = 'blocked';

                    const metaParts = [];
                    if (issue && issue !== title) metaParts.push(issue);
                    if (assignee) metaParts.push(assignee);
                    if (dueDate) metaParts.push('Due: ' + dueDate);
                    else if (created) metaParts.push(created);
                    if (disposition) metaParts.push(disposition);

                    const viewLink = viewUrl ? `<a href="${viewUrl}" target="_blank" style="font-size:11px;color:var(--status-info);text-decoration:none;margin-left:6px;">View &rarr;</a>` : '';

                    html += `<div class="qb-ticket-item">
                        <div class="qb-ticket-priority ${priClass}"></div>
                        <div class="qb-ticket-body">
                            <div class="qb-ticket-row1">
                                <div class="qb-ticket-title">${escapeHtml(title)}${viewLink}</div>
                                <span class="qb-ticket-status ${statusClass}">${escapeHtml(status)}</span>
                            </div>
                            <div class="qb-ticket-meta">${escapeHtml(metaParts.join(' · '))}</div>
                        </div>
                    </div>`;
                });

                container.innerHTML = html;
            } catch (e) {
                console.error('[QBSkin] Error loading tickets:', e);
                container.innerHTML = `<div class="qb-notes-placeholder">Could not load tickets<br><small style="color:#999;">${escapeHtml(e.message)}</small></div>`;
            }
        }

        // ========================================
        // Load Communications (SMS + Calls)
        // ========================================
        let commsData = { calls: [], texts: [], all: [] };

        async function loadCommunications() {
            const container = document.getElementById('commsContainer');
            if (!container) return;

            // Get the contact record ID from the project (FID 144)
            const contactId = qbv(projectData, 144);
            if (!contactId) {
                container.innerHTML = '<div class="qb-notes-placeholder">No contact linked to this project</div>';
                setupCommsTabs();
                return;
            }
            console.log('[QBSkin] Loading comms for contact ID:', contactId);

            try {
                // Query both tables in parallel
                // SMS table (bvjf44d7d): FID 36=Related Contact, 9=direction, 10=from_number, 11=to_number, 12=text, 13=message_status, 23=contact.name, 29=user.name, 40=event_timestamp(Date/Time)
                const smsFields = [3, 9, 10, 11, 12, 13, 23, 29, 36, 40];
                const smsWhere = `{'36'.EX.'${contactId}'}`;

                // Call Log table (bvjf2i36u): FID 84=Related Contact, 18=direction, 19=from_number, 20=from_name, 21=to_number, 22=to_name, 16=duration, 10=call_state, 34=contact.name, 93=Event Timestamp(Date/Time), 52=transcription_text, 45=recording_url, 60=voicemail_transcription
                const callFields = [3, 10, 16, 18, 19, 20, 21, 22, 34, 45, 52, 60, 84, 93];
                const callWhere = `{'84'.EX.'${contactId}'}`;

                const [smsResult, callResult] = await Promise.all([
                    apiQuery(QB_CONFIG.tables.smsLog, smsFields, smsWhere, 50),
                    apiQuery(QB_CONFIG.tables.callLog, callFields, callWhere, 50)
                ]);

                console.log('[QBSkin] SMS records:', smsResult.data?.length || 0, 'Call records:', callResult.data?.length || 0);

                // Process SMS records
                commsData.texts = (smsResult.data || []).map(rec => {
                    const dir = String(qbv(rec, 9) || '').toLowerCase();
                    const ts = qbv(rec, 40);  // FID 40: event_timestamp (Date/Time) — QB timestamp
                    return {
                        type: 'sms',
                        direction: dir,
                        from: String(qbv(rec, 10) || ''),
                        to: String(qbv(rec, 11) || ''),
                        text: String(qbv(rec, 12) || ''),
                        status: String(qbv(rec, 13) || ''),
                        contactName: String(qbv(rec, 23) || ''),
                        userName: String(qbv(rec, 29) || ''),
                        timestamp: ts,
                        sortKey: ts || ''
                    };
                });

                // Process Call records
                commsData.calls = (callResult.data || []).map(rec => {
                    const dir = String(qbv(rec, 18) || '').toLowerCase();
                    const state = String(qbv(rec, 10) || '').toLowerCase();
                    const dur = parseInt(qbv(rec, 16)) || 0;
                    const ts = qbv(rec, 93); // FID 93: Event Timestamp (Date/Time) — QB timestamp
                    const isMissed = state === 'missed' || (dur === 0 && dir === 'inbound');
                    return {
                        type: 'call',
                        direction: dir,
                        missed: isMissed,
                        fromNumber: String(qbv(rec, 19) || ''),
                        fromName: String(qbv(rec, 20) || ''),
                        toNumber: String(qbv(rec, 21) || ''),
                        toName: String(qbv(rec, 22) || ''),
                        contactName: String(qbv(rec, 34) || ''),
                        duration: dur,
                        callState: state,
                        recordingUrl: String(qbv(rec, 45) || ''),
                        transcription: String(qbv(rec, 52) || ''),
                        voicemail: String(qbv(rec, 60) || ''),
                        timestamp: ts,
                        sortKey: ts || ''
                    };
                });

                // Merge and sort descending
                commsData.all = [...commsData.calls, ...commsData.texts].sort((a, b) => {
                    return String(b.sortKey).localeCompare(String(a.sortKey));
                });

                // Update tab counts
                const tabs = document.querySelectorAll('.qb-comms-tab');
                tabs.forEach(tab => {
                    const t = tab.getAttribute('data-tab');
                    let count = 0;
                    if (t === 'all') count = commsData.all.length;
                    else if (t === 'calls') count = commsData.calls.length;
                    else if (t === 'texts') count = commsData.texts.length;
                    const existing = tab.querySelector('.tab-count');
                    if (existing) existing.textContent = count;
                    else tab.innerHTML += ` <span class="tab-count">${count}</span>`;
                });

                renderComms('all');
                setupCommsTabs();
            } catch (e) {
                console.error('[QBSkin] Error loading communications:', e);
                container.innerHTML = `<div class="qb-notes-placeholder">Could not load communications<br><small style="color:#999;">${escapeHtml(e.message)}</small></div>`;
            }
        }

        function setupCommsTabs() {
            const tabs = document.querySelectorAll('.qb-comms-tab');
            tabs.forEach(tab => {
                tab.addEventListener('click', () => {
                    tabs.forEach(t => t.classList.remove('active'));
                    tab.classList.add('active');
                    renderComms(tab.getAttribute('data-tab'));
                });
            });
        }

        function renderComms(filter) {
            const container = document.getElementById('commsContainer');
            if (!container) return;

            let items = [];
            if (filter === 'calls') items = commsData.calls.sort((a,b) => String(b.sortKey).localeCompare(String(a.sortKey)));
            else if (filter === 'texts') items = commsData.texts.sort((a,b) => String(b.sortKey).localeCompare(String(a.sortKey)));
            else items = commsData.all;

            if (items.length === 0) {
                const label = filter === 'all' ? 'communications' : filter;
                container.innerHTML = `<div class="qb-notes-placeholder">No ${label} found</div>`;
                return;
            }

            // Show max 20, with "show more" button
            const showCount = 20;
            const visible = items.slice(0, showCount);
            let html = '';

            visible.forEach(item => {
                if (item.type === 'call') {
                    html += renderCallItem(item);
                } else {
                    html += renderSmsItem(item);
                }
            });

            if (items.length > showCount) {
                html += `<div style="text-align:center;padding:8px;"><span style="font-size:12px;color:var(--text-muted);">${items.length - showCount} more not shown</span></div>`;
            }

            container.innerHTML = html;
        }

        function renderCallItem(c) {
            const iconClass = c.missed ? 'call-missed' : (c.direction === 'inbound' ? 'call-in' : 'call-out');
            const iconSvg = c.missed
                ? `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6A19.79 19.79 0 0 1 2.12 4.11 2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72c.127.96.361 1.903.7 2.81a2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0 1 22 16.92z"/><line x1="1" y1="1" x2="23" y2="23"/></svg>`
                : (c.direction === 'inbound'
                    ? `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6A19.79 19.79 0 0 1 2.12 4.11 2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72c.127.96.361 1.903.7 2.81a2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0 1 22 16.92z"/><polyline points="16 2 16 8 22 8"/></svg>`
                    : `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6A19.79 19.79 0 0 1 2.12 4.11 2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72c.127.96.361 1.903.7 2.81a2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0 1 22 16.92z"/><polyline points="8 22 8 16 2 16"/></svg>`
                );

            const who = c.direction === 'inbound'
                ? (c.fromName || c.contactName || formatPhoneDisplay(c.fromNumber) || 'Unknown')
                : (c.toName || c.contactName || formatPhoneDisplay(c.toNumber) || 'Unknown');

            const dirLabel = c.missed ? 'Missed' : (c.direction === 'inbound' ? 'Incoming' : 'Outgoing');
            const durStr = c.duration > 0 ? formatDuration(c.duration) : '';
            const timeStr = c.timestamp ? formatCommsTime(c.timestamp) : '';

            let badges = '';
            if (durStr) badges += `<span class="qb-comms-badge duration">${durStr}</span>`;
            if (c.voicemail) badges += `<span class="qb-comms-badge voicemail">VM</span>`;
            if (c.recordingUrl) badges += `<a href="${c.recordingUrl}" target="_blank" class="qb-comms-badge recording" style="text-decoration:none;">REC</a>`;

            let detail = `<span>${dirLabel}</span>${badges}`;
            if (c.voicemail) {
                detail += `<div class="msg-preview" style="margin-top:3px;font-style:italic;">${escapeHtml(c.voicemail.substring(0, 120))}${c.voicemail.length > 120 ? '...' : ''}</div>`;
            } else if (c.transcription) {
                detail += `<div class="msg-preview" style="margin-top:3px;font-style:italic;">${escapeHtml(c.transcription.substring(0, 120))}${c.transcription.length > 120 ? '...' : ''}</div>`;
            }

            return `<div class="qb-comms-item">
                <div class="qb-comms-icon ${iconClass}">${iconSvg}</div>
                <div class="qb-comms-body">
                    <div class="qb-comms-row1">
                        <div class="qb-comms-who">${escapeHtml(who)}</div>
                        <div class="qb-comms-when">${timeStr}</div>
                    </div>
                    <div class="qb-comms-detail">${detail}</div>
                </div>
            </div>`;
        }

        function renderSmsItem(s) {
            const iconClass = s.direction === 'inbound' ? 'sms-in' : 'sms-out';
            const iconSvg = `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>`;

            // For inbound: show who sent it (contact or user name, fallback to from #)
            // For outbound: show who it was sent TO (contact name, fallback to to #)
            const who = s.direction === 'inbound'
                ? (s.contactName || s.userName || formatPhoneDisplay(s.from) || 'Unknown')
                : (s.contactName || formatPhoneDisplay(s.to) || 'Unknown');
            // Show the internal user who sent/received on outbound/inbound
            const byLine = s.direction === 'inbound' ? '' : (s.userName ? ` · by ${s.userName}` : '');

            const dirLabel = s.direction === 'inbound' ? 'Received' : 'Sent';
            const timeStr = s.timestamp ? formatCommsTime(s.timestamp) : '';
            const isLong = s.text && s.text.length > 80;
            const preview = s.text ? s.text.substring(0, 80) + (isLong ? '...' : '') : dirLabel;
            const uid = 'sms_' + Math.random().toString(36).substr(2, 6);

            // Status badge — yellow for pending, red for failed/error, hidden for delivered/sent
            let statusBadge = '';
            if (s.status) {
                const stLow = s.status.toLowerCase();
                if (stLow === 'pending' || stLow === 'queued') {
                    statusBadge = `<span class="qb-comms-badge" style="background:#fef3c7;color:#92400e;font-size:10px;">${escapeHtml(s.status)}</span>`;
                } else if (stLow !== 'delivered' && stLow !== 'sent' && stLow !== '') {
                    statusBadge = `<span class="qb-comms-badge" style="background:#fef2f2;color:#dc2626;font-size:10px;">${escapeHtml(s.status)}</span>`;
                }
            }

            // Full message (hidden by default, toggled on tap)
            const fullMsg = isLong ? `<div id="${uid}" style="display:none;margin-top:4px;padding:8px;background:var(--warm-lighter);border-radius:6px;font-size:12px;line-height:1.5;color:var(--text);white-space:pre-wrap;word-break:break-word;">${escapeHtml(s.text)}</div>` : '';
            const tapHandler = isLong ? `onclick="var el=document.getElementById('${uid}');el.style.display=el.style.display==='none'?'block':'none';"` : '';
            const tapHint = isLong ? ' style="cursor:pointer;"' : '';

            return `<div class="qb-comms-item"${tapHint} ${tapHandler}>
                <div class="qb-comms-icon ${iconClass}">${iconSvg}</div>
                <div class="qb-comms-body">
                    <div class="qb-comms-row1">
                        <div class="qb-comms-who">${escapeHtml(who)} <span style="font-weight:400;font-size:11px;color:var(--text-muted);">${dirLabel}${byLine}</span>${statusBadge}</div>
                        <div class="qb-comms-when">${timeStr}</div>
                    </div>
                    <div class="qb-comms-detail"><div class="msg-preview">${escapeHtml(preview)}</div></div>
                    ${fullMsg}
                </div>
            </div>`;
        }

        function formatPhoneDisplay(num) {
            if (!num) return '';
            const clean = num.replace(/\D/g, '');
            if (clean.length === 10) return `(${clean.slice(0,3)}) ${clean.slice(3,6)}-${clean.slice(6)}`;
            if (clean.length === 11 && clean[0] === '1') return `(${clean.slice(1,4)}) ${clean.slice(4,7)}-${clean.slice(7)}`;
            return num;
        }

        function formatDuration(rawDuration) {
            // Dialpad duration can be in seconds or milliseconds
            // If value > 86400 (24 hours in seconds), assume milliseconds
            let seconds = Math.round(rawDuration > 86400 ? rawDuration / 1000 : rawDuration);
            if (seconds <= 0) return '0s';
            if (seconds < 60) return `${seconds}s`;
            const m = Math.floor(seconds / 60);
            const s = seconds % 60;
            if (m >= 60) {
                const h = Math.floor(m / 60);
                const rm = m % 60;
                return rm > 0 ? `${h}h ${rm}m` : `${h}h`;
            }
            return s > 0 ? `${m}m ${s}s` : `${m}m`;
        }

        function formatCommsTime(ts) {
            if (!ts) return '';
            try {
                const d = new Date(typeof ts === 'string' && ts.includes('T') ? ts : ts + 'T12:00:00');
                if (isNaN(d)) return '';
                const now = new Date();
                const diffMs = now - d;
                const diffDays = Math.floor(diffMs / 86400000);
                if (diffDays === 0) {
                    return d.toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit' });
                } else if (diffDays === 1) {
                    return 'Yesterday';
                } else if (diffDays < 7) {
                    return d.toLocaleDateString('en-US', { weekday: 'short' });
                } else {
                    return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
                }
            } catch (e) {
                return '';
            }
        }

        // ========================================
        // Note Modal Handlers
        // ========================================
        function toggleNoteForm() {
            const form = document.getElementById('noteForm');
            const btn = document.getElementById('addNoteBtn');
            const isOpen = form.classList.contains('open');
            if (isOpen) {
                closeNoteForm();
            } else {
                form.classList.add('open');
                btn.style.display = 'none';
                // Focus the textarea after the animation
                setTimeout(() => document.getElementById('noteText').focus(), 100);
            }
        }

        function closeNoteForm() {
            const form = document.getElementById('noteForm');
            const btn = document.getElementById('addNoteBtn');
            form.classList.remove('open');
            btn.style.display = '';
            // Reset form fields
            document.getElementById('noteText').value = '';
            document.getElementById('noteCategory').value = '';
            document.getElementById('noteType').value = '';
        }

        async function submitNote() {
            const noteText = document.getElementById('noteText').value.trim();
            if (!noteText) {
                document.getElementById('noteText').style.borderColor = '#ef4444';
                setTimeout(() => { document.getElementById('noteText').style.borderColor = ''; }, 1500);
                return;
            }

            const category = document.getElementById('noteCategory').value || 'General';
            const type = document.getElementById('noteType').value || '';
            const saveBtn = document.getElementById('noteSaveBtn');

            // Disable button while saving
            saveBtn.disabled = true;
            saveBtn.textContent = 'Saving...';

            try {
                // Notes table (bsb6bqt3b) field IDs:
                // 13 = Related Project, 6 = Note, 7 = Category, 8 = Date, 38 = Type
                const noteData = {
                    "13": { value: recordId },
                    "6": { value: noteText },
                    "7": { value: category },
                    "8": { value: new Date().toISOString().split('T')[0] }
                };
                if (type) noteData["38"] = { value: type };

                await apiUpsert(QB_CONFIG.tables.notes, noteData);
                closeNoteForm();
                // Refresh notes list in-place (no page reload)
                await loadExistingNotes();
            } catch (err) {
                console.error('[QBSkin] Error saving note:', err);
                saveBtn.textContent = 'Error — Retry';
            } finally {
                saveBtn.disabled = false;
                if (saveBtn.textContent === 'Saving...') saveBtn.textContent = 'Save Note';
            }
        }

        // ========================================
        // Status Dropdown
        // ========================================
        function openStatusDropdown(e) {
            const statusOptions = ['Active', 'Rejected', 'Finance Hold', 'Pending Cancel', 'Cancel'];
            const btn = e.target.closest('button');
            const rect = btn.getBoundingClientRect();

            let dropdown = document.getElementById('statusDropdown');
            if (!dropdown) {
                dropdown = document.createElement('div');
                dropdown.id = 'statusDropdown';
                dropdown.className = 'qb-status-dropdown';
                document.body.appendChild(dropdown);
            }

            dropdown.innerHTML = statusOptions.map(opt => `
                <div class="qb-status-option" data-status="${opt}">${escapeHtml(opt)}</div>
            `).join('');

            dropdown.style.position = 'fixed';
            dropdown.style.top = (rect.top - 10) + 'px';
            dropdown.style.left = (rect.left - 80) + 'px';
            dropdown.style.display = 'block';

            // Attach click handlers
            dropdown.querySelectorAll('.qb-status-option').forEach(opt => {
                opt.addEventListener('click', () => {
                    const newStatus = opt.getAttribute('data-status');
                    updateProjectStatus(newStatus);
                    dropdown.style.display = 'none';
                });
            });

            // Close on outside click
            document.addEventListener('click', (e) => {
                if (!e.target.closest('#statusDropdown') && !e.target.closest('#updateStatusBtn')) {
                    dropdown.style.display = 'none';
                }
            }, { once: true });
        }

        function updateProjectStatus(newStatus) {
            // Update using correct field IDs - Status field is 255
            const statusData = {
                "3": { value: recordId },
                "255": { value: newStatus }  // Status field ID is 255
            };

            console.log('Updating status to:', newStatus);

            // Implement actual upsert
            apiUpsert(QB_CONFIG.tables.projects, statusData).then(() => {
                alert(`Status updated to: ${newStatus}`);
                location.reload();
            }).catch(err => {
                console.error('Error updating status:', err);
                alert('Failed to update status');
            });
        }


        // ========================================
        // HTML Escape (Security)
        // ========================================
        function escapeHtml(text) {
            if (!text) return '';
            const map = {
                '&': '&amp;',
                '<': '&lt;',
                '>': '&gt;',
                '"': '&quot;',
                "'": '&#039;'
            };
            return text.toString().replace(/[&<>"']/g, char => map[char]);
        }

        // ========================================
        // Global Search (on Project Detail page)
        // ========================================
        let projectSearchOpen = false;
        let projectSearchTimer = null;

        function toggleProjectSearch() {
            projectSearchOpen = !projectSearchOpen;
            const bar = document.getElementById('projectSearchBar');
            const results = document.getElementById('projectSearchResults');
            const hdr = document.querySelector('.qb-header');
            if (projectSearchOpen) {
                // Measure actual header height at runtime (handles all device sizes correctly)
                if (hdr) bar.style.top = hdr.offsetHeight + 'px';
                bar.classList.add('open');
                document.getElementById('projectSearchInput').focus();
            } else {
                bar.classList.remove('open');
                results.style.display = 'none';
                document.getElementById('projectSearchInput').value = '';
            }
        }

        function handleProjectSearch(val) {
            clearTimeout(projectSearchTimer);
            const q = val.trim();
            if (q.length < 2) {
                document.getElementById('projectSearchResults').style.display = 'none';
                return;
            }
            projectSearchTimer = setTimeout(() => doProjectSearch(q), 400);
        }

        async function doProjectSearch(query) {
            const container = document.getElementById('projectSearchResults');
            container.style.display = 'block';
            container.innerHTML = '<div class="sr-msg">Searching all projects...</div>';
            try {
                const q = query.replace(/'/g, "\\'");
                // Confirmed FIDs from Projects table
                const fullNameFid = 367; // Residential Client - Full Name
                const addressFid = 146;  // Customer Address
                const phoneFid = 148;    // Residential Client - Mobile Phone
                const emailFid = 149;    // Residential Client - Email
                const statusFid = 255;   // Status
                const kwFid = 13;        // System Size(kW)
                const stateFid = 189;    // Customer - State
                const sel = [3, fullNameFid, addressFid, phoneFid, emailFid, statusFid, kwFid, stateFid];

                // Infix OR syntax for CT operator
                const where = `{${fullNameFid}.CT.'${q}'}OR{${addressFid}.CT.'${q}'}OR{${phoneFid}.CT.'${q}'}`;
                const result = await apiQuery(QB_CONFIG.tables.projects, sel, where, 30);
                const data = result.data || [];

                if (!data.length) {
                    container.innerHTML = '<div class="sr-msg">No projects found for "' + escapeHtml(query) + '"</div>';
                    return;
                }

                container.innerHTML = data.map(r => {
                    const rid = qbv(r, 3);
                    const name = qbv(r, fullNameFid) || 'Unknown';
                    const address = qbv(r, addressFid) || '';
                    const phone = qbv(r, phoneFid) || '';
                    const email = qbv(r, emailFid) || '';
                    const status = qbv(r, statusFid) || '';
                    const kw = parseFloat(qbv(r, kwFid) || 0);
                    const state = qbv(r, stateFid) || '';
                    const sub = [kw ? kw.toFixed(1) + ' kW' : '', address, state].filter(Boolean).join(' \u00b7 ');
                    const contact = [phone, email].filter(Boolean).join(' \u00b7 ');
                    const detailUrl = window.location.pathname + '?a=dbpage&pagename=qb-skin-project-detail.html#rid=' + encodeURIComponent(rid);
                    return '<div class="sr-card" onclick="window.location.href=\'' + detailUrl + '\';window.location.reload();">' +
                        '<div class="sr-name">' + escapeHtml(name) + '<span class="sr-status">' + escapeHtml(status) + '</span></div>' +
                        (sub ? '<div class="sr-sub">' + escapeHtml(sub) + '</div>' : '') +
                        (contact ? '<div class="sr-sub" style="color:#94a3b8;font-size:11px">' + escapeHtml(contact) + '</div>' : '') +
                        '</div>';
                }).join('');
            } catch (err) {
                console.error('[QBSkin] Project search error:', err);
                container.innerHTML = '<div class="sr-msg">Search failed: ' + escapeHtml(err.message) + '</div>';
            }
        }

        // ========================================
        document.addEventListener('DOMContentLoaded', () => {
            // Back button
            document.getElementById('backBtn').addEventListener('click', () => {
                window.location.href = 'https://kin.quickbase.com/db/br9kwm8bk?a=dbpage&pagename=cc-quick-glance.html';
            });

            // Load project data
            loadProjectDetail();
        });
    </script>
